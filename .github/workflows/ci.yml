name: CI

on:
  push:
  pull_request:

jobs:
  offline-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint code with ruff
        run: ruff check .

      - name: Compile project modules
        run: python -m compileall src app.py scripts

      - name: Run offline tests
        run: python -m unittest discover -s tests

      - name: Run router behavior evaluation
        run: python -m scripts.evaluate_router_behavior --fail-under-intent 0.95 --fail-under-strategy 0.95
