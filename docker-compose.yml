services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      STUDENT_RAG_CORS_ORIGINS: "http://localhost:8501,http://127.0.0.1:8501"
    ports:
      - "8000:8000"
    volumes:
      - ./data/vectorstore:/app/data/vectorstore:ro
      - ./data/processed:/app/data/processed:ro

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -m streamlit run app.py --server.address 0.0.0.0 --server.port 8501 --server.fileWatcherType none"
    env_file:
      - .env
    environment:
      STUDENT_RAG_API_BASE_URL: "http://api:8000"
      STUDENT_RAG_EXECUTION_MODE: "API"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api
