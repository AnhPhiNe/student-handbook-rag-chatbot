input:
  scoring_tables: data/processed/tables/scoring_tables.json
  formula_rules: data/processed/tables/formula_rules.json
  form_templates: data/processed/forms/form_templates.json
  program_directory: data/processed/directories/program_directory.json
  entity_registry: data/processed/entities/entity_registry.json
  query_expansion_rules: data/processed/entities/query_expansion_rules.json

embedding:
  model_name: BAAI/bge-m3
  batch_size: 8
  normalize_embeddings: true

vectorstore:
  persist_dir: data/vectorstore/chroma
  collection_name: student_handbook_semantic_v5

retrieval:
  default_top_k: 5
  candidate_multiplier: 5
  min_candidates: 25

query_rewriter:
  enabled: true
  api_key_env_var: QUERY_REWRITER_API_KEY
  model_name: llama-3.1-8b-instant
  temperature: 0.0
  max_output_tokens: 256
  max_retries: 1
  request_timeout_seconds: 8
  trigger_on_accentless: true
  trigger_on_short_query: true
  trigger_on_typo_signals: true

llm:
  provider: groq
  model_name: llama-3.3-70b-versatile
  temperature: 0.0
  max_output_tokens: 4096
  max_retries: 3
  retry_base_delay_seconds: 2
  retry_max_delay_seconds: 20
  request_timeout_seconds: 60
  request_sleep_seconds: 2
  max_context_chars: 6000

context_allocation:
  strategy: score_weighted
  min_chars_per_doc: 400
  max_chars_per_doc: 1800
  sentence_boundary: true
  cache_version: context_alloc_v3_source_aware_context

cache:
  enabled: true
  path: data/cache/answer_response_cache.json

semantic_cache:
  enabled: true
  persist_dir: data/cache/semantic_cache_chroma
  collection_name: semantic_query_cache_v2
  max_distance: 0.15
  min_query_length: 8
  verifier_model: llama-3.1-8b-instant
  verifier_temperature: 0.0
  verifier_max_tokens: 8

citations:
  max_sources: 3
  prefer_intent_chunk_type: true
  deduplicate: true

guardrails:
  skip_llm_on_low_confidence: true
  allow_deterministic_direct_answer: true

output:
  test_report: data/processed/metadata/answer_generation_test_report.json
