input:
  scoring_tables: data/processed/tables/scoring_tables.json
  formula_rules: data/processed/tables/formula_rules.json
  student_service_directory: data/processed/directories/student_service_directory.json
  student_office_profiles: data/processed/directories/student_office_profiles.json
  student_faculty_profiles: data/processed/directories/student_faculty_profiles.json
  foreign_language_equivalency_table: data/processed/tables/foreign_language_equivalency_table.json
  structured_tables_registry: data/processed/tables/structured_tables_registry.json
  program_directory: data/processed/directories/program_directory.json
  entity_registry: data/processed/entities/entity_registry.json
  query_expansion_rules: data/processed/entities/query_expansion_rules.json

embedding:
  model_name: BAAI/bge-m3
  batch_size: 8
  normalize_embeddings: true

vectorstore:
  persist_dir: data/vectorstore/chroma
  collection_name: student_handbook_semantic_v7

retrieval:
  default_top_k: 5
  candidate_multiplier: 5
  min_candidates: 25

llm:
  provider: gemini
  model_name: gemini-3.1-flash-lite
  api_key_env_var: GEMINI_API_KEY
  temperature: 0.0
  max_output_tokens: 4096
  max_retries: 3
  retry_base_delay_seconds: 2
  retry_max_delay_seconds: 20
  request_timeout_seconds: 60
  request_sleep_seconds: 0
  max_context_chars: 160000
  key_pool:
    rpm_limit_per_key: 12
    rpd_limit_per_key: 450
    cooldown_on_rate_limit_seconds: 65
    state_path: data/cache/gemini_key_state.json
    wait_when_all_keys_limited: true

context_allocation:
  strategy: full_sources
  min_chars_per_doc: 0
  max_chars_per_doc: 50000
  sentence_boundary: true
  cache_version: context_alloc_v14_full_sources_gemini

cache:
  enabled: true
  path: data/cache/answer_response_cache.json

semantic_cache:
  enabled: true
  persist_dir: data/cache/semantic_cache_chroma
  collection_name: semantic_query_cache_v2
  max_distance: 0.15
  min_query_length: 8
  verifier_model: llama-3.1-8b-instant
  verifier_temperature: 0.0
  verifier_max_tokens: 8

citations:
  max_sources: 5
  prefer_intent_chunk_type: true
  deduplicate: true

guardrails:
  skip_llm_on_low_confidence: true
  allow_deterministic_direct_answer: false

output:
  test_report: data/processed/metadata/answer_generation_test_report.json
