input:
  scoring_tables: data/processed/tables/scoring_tables.json
  formula_rules: data/processed/tables/formula_rules.json
  form_templates: data/processed/forms/clean_form_templates.json
  student_service_directory: data/processed/directories/student_service_directory.json
  student_office_profiles: data/processed/directories/student_office_profiles.json
  student_faculty_profiles: data/processed/directories/student_faculty_profiles.json
  foreign_language_equivalency_table: data/processed/tables/foreign_language_equivalency_table.json
  structured_tables_registry: data/processed/tables/structured_tables_registry.json
  faculty_directory: data/processed/directories/faculty_directory.json
  program_directory: data/processed/directories/program_directory.json
  faculty_program_directory: data/processed/directories/faculty_program_directory.json
  procedures: data/processed/procedures/procedures.json
  entity_registry: data/processed/entities/entity_registry.json
  query_expansion_rules: data/processed/entities/query_expansion_rules.json


embedding:
  model_name: BAAI/bge-m3
  batch_size: 8
  normalize_embeddings: true

vectorstore:
  provider: qdrant_cloud
  collection_name: student_handbook_semantic_v7
  persist_directory: data/processed/chroma

retrieval:
  default_top_k: 5
  filtered_top_k: 5
  candidate_multiplier: 5
  min_candidates: 25

output:
  test_report: data/processed/metadata/retrieval_test_report.json
